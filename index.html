<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Venkatesh &amp; Brindha — 22 &amp; 23 August 2026</title>
<meta name="description" content="Venkatesh and Brindha invite you to their wedding — Reception on 22 August and Muhurtham on 23 August 2026, at Shri Kalpana Mahal, Puducherry." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/gate.css">
<link rel="preload" href="audio/anbil-avan.mp3" as="audio">
<link rel="prefetch" href="invite.html">
<link rel="prefetch" href="images/optimized/hero.jpg">
</head>
<body>
  <div class="gate" id="gate" role="button" tabindex="0" aria-label="Tap anywhere to open the invitation">
    <div class="gate__photo"></div>
    <div class="gate__vignette"></div>
    <div class="gate__topscrim"></div>

    <div class="gate__invite">
      <p class="gate__invite-eyebrow">You are invited to the wedding of</p>
      <p class="gate__invite-names">Venkatesh &amp; Brindha</p>
    </div>

    <div class="gate__content">
      <svg class="gate__lock" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="11" y="21" width="26" height="20" rx="3" stroke="currentColor" stroke-width="1.4"/>
        <path d="M16 21v-6a8 8 0 0 1 16 0v6" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="24" cy="30" r="2.2" stroke="currentColor" stroke-width="1.2"/>
        <line x1="24" y1="32.2" x2="24" y2="36" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      <p class="gate__cue">Unlock the E&ndash;Invite</p>
      <p class="gate__date">22 &amp; 23 August 2026</p>
      <p class="gate__hint">Best experienced with sound on</p>
    </div>

    <div class="gate__iris" id="iris" aria-hidden="true"></div>

    <button class="gate__mute" id="muteToggle" aria-label="Mute music" aria-pressed="false">
      <svg class="gate__mute-icon gate__mute-icon--on" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 9v6h3.5L13 19V5L7.5 9H4z" fill="currentColor"/>
        <path d="M16.2 8.5a4.8 4.8 0 0 1 0 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M18.4 6.2a8 8 0 0 1 0 11.6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
      </svg>
      <svg class="gate__mute-icon gate__mute-icon--off" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 9v6h3.5L13 19V5L7.5 9H4z" fill="currentColor"/>
        <path d="M16 9l5 5M21 9l-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <audio id="bgm" preload="auto">
    <source src="audio/anbil-avan.mp3" type="audio/mpeg">
  </audio>

  <script src="js/gate.js"></script>
</body>
</html>
